# Skills manifest — controls which /commands appear in Telegram.
#
# enabled: false  →  skill folder renamed to <name>.off on Oracle (hidden from Hermes)
# enabled: true   →  skill folder is active
#
# Skills marked "# repo" have their SKILL.md in this repo under skills/<name>/
# All other skills have their content managed privately or by Hermes built-ins.
#
# Push this file to enable/disable skills. No SSH required.

skills:
