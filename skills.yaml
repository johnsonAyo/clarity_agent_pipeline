# Skills manifest — controls which /commands appear in Telegram.
#
# enabled: false  →  skill is hidden from Telegram (SKILL.md renamed to .off on Oracle)
# enabled: true   →  skill is active
#
# Skills marked with a comment "# repo" have their SKILL.md in this repo under skills/<name>/
# All other skills have their SKILL.md managed privately via ~/skills/ on Mac.
#
# Push this file to enable/disable skills. No SSH required.

skills:
  # ── Custom skills (SKILL.md lives in this repo) ──────────────────────────
  - name: clarity-pipeline
    enabled: true        # repo

  - name: skill-manager
    enabled: true        # repo

  # ── Private skills (SKILL.md in ~/skills/, not on GitHub) ────────────────
