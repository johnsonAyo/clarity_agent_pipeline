name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run E2E Test
        env:
          # These are required to initialize config.py and connect to the APIs
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OUTPUT_BOT_TOKEN: ${{ secrets.TELEGRAM_OUTPUT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          python test_pipeline.py

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Navigate to the project directory (update this if your path is different!)
            cd ~/clarity_bot_pipeline
            
            # Pull latest changes from the main branch
            git pull origin main
            
            # Install any new dependencies
            pip3 install -r requirements.txt
            
            # Restart the bot using PM2
            pm2 restart clarity-bot
